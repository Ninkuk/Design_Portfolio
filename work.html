<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Work — Ninad Kulkarni</title>
  <meta name="description" content="Complete archive of design work — logos, print, social, photography, and more.">
  <link rel="icon" type="image/jpeg" href="./favicon.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/tokens.css">
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/components.css">
  <link rel="stylesheet" href="./css/responsive.css">
</head>
<body>
  <header class="container" style="padding-top: var(--sp-4);">
    <a href="./index.html" class="label" style="color: var(--accent);">&larr; Ninad Kulkarni</a>
  </header>

  <div class="container cs-header">
    <div class="label" style="color: var(--accent);">Archive</div>
    <h1>All Work</h1>
    <p class="archive-summary" id="archive-summary">Loading&hellip;</p>

    <div class="filter-chips" id="filter-chips" role="group" aria-label="Filter work by category">
      <!-- rendered by js/archive.js -->
    </div>
  </div>

  <main class="container">
    <div class="gallery-grid" id="archive-grid"></div>
  </main>

  <footer class="container" style="padding: var(--sp-6) var(--gutter) var(--sp-4); color: var(--text-muted); font-size: var(--fs-sm);">
    <hr class="rule" style="margin-bottom: var(--sp-3);">
    <a href="./index.html" style="color: var(--text-muted);">&larr; Back to all work</a>
  </footer>

  <script src="./js/archive.js" defer></script>
  <script src="./js/lightbox.js" defer></script>
</body>
</html>
